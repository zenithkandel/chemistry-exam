<!doctype html>

    <link rel="stylesheet" href="css/styles.css">

                        <path d="M8 16h8"/>

                </div>
                <div class="sidebar-logo-text">
                    ChemCrash
                    <span>2083 Edition</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active" data-page="dashboard">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    Dashboard
                </div>
                <div class="nav-item" data-page="quiz">
                    <svg viewBox="0 0 24 24"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v6l4 2"/></svg>

                        <input type="text" id="searchInput" placeholder="Search topics, chapters...">
                        <div class="search-results" id="searchResults"></div>
                    </div>
                    <button class="icon-btn" id="notifBtn">
                        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>

                    <div class="avatar" id="userAvatar">ST</div>
                </div>

            <main class="main-content" id="mainContent">
            </main>
        </div>
    </div>

    <script src="js/app.js"></script>

</html>
